name: Build list artifacts
on:
  push:
    branches: [main]
permissions:
  contents: write

# Serialise so parallel merges don't race on the push
concurrency:
  group: build-artifacts
  cancel-in-progress: false
jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm ci
      - run: npm run sanitise && npm run build
      - name: Commit regenerated artifacts if changed
        run: |
          if ! git diff --quiet lists.json list-metadata.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add lists.json list-metadata.json
            git commit -m "build: regenerate list artifacts [skip ci]"
            git pull --rebase origin main || true
            git push
          else
            echo "artifacts already up to date"
          fi
